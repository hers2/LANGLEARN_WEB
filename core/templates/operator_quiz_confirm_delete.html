{% extends 'base.html' %}
{% block title %}Hapus Soal{% endblock %}
{% block content %}
<div class="header-text">
    <h1>⚠️ Hapus Soal</h1>
    <p>Konfirmasi penghapusan soal quiz</p>
</div>

<div class="card" style="max-width:700px;">
    <div class="mini-card" style="background:#fee5e5; border-color:var(--danger); border-width:2px;">
        <h3 style="color:var(--danger); margin-bottom:12px;"><i class="fas fa-exclamation-triangle"></i> Apakah yakin ingin menghapus soal ini?</h3>
        <p><b>{{ question.question }}</b></p>
    </div>
    
    <div style="display:flex; gap:12px; margin-top:24px;">
        <form method="POST" style="flex:1;">
            {% csrf_token %}
            <button class="btn-primary" type="submit" style="width:100%; background:var(--danger);"><i class="fas fa-trash"></i> Ya, Hapus</button>
        </form>
        <a href="{% url 'operator_quiz_list' %}" class="small-btn" style="flex:1; text-align:center;"><i class="fas fa-times"></i> Batal</a>
    </div>
</div>
{% endblock %}
