{% load static %}

<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangLearn - Register</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>

<body class="auth-page">

    <div class="auth-wrapper">
        <div class="auth-card">

            <h2 style="
                font-size: 2rem;
                color: #6366f1;
                margin-bottom: 0.5rem;
                text-align:center;
            ">
                LangLearn
            </h2>

            <p style="
                color:#64748b;
                margin-bottom:2rem;
                text-align:center;
            ">
                Buat akun baru 🚀
            </p>

            {% if messages %}
                {% for message in messages %}
                    <div style="
                        margin-bottom: 1rem;
                        padding: 1rem;
                        border-radius: 12px;
                        background: #fee2e2;
                        color: #dc2626;
                        font-size: 0.95rem;
                    ">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="form-group" style="margin-bottom:1.5rem;">
                    <label style="display:block; margin-bottom:8px; font-weight:600;">
                        Nama Lengkap
                    </label>
                    <input
                        type="text"
                        name="fullname"
                        placeholder="Masukkan nama lengkap"
                        required
                    >
                </div>

                <div class="form-group" style="margin-bottom:1.5rem;">
                    <label style="display:block; margin-bottom:8px; font-weight:600;">
                        Username
                    </label>
                    <input
                        type="text"
                        name="username"
                        placeholder="Buat username unik"
                        required
                    >
                </div>

                <div class="form-group" style="margin-bottom:1.5rem;">
                    <label style="display:block; margin-bottom:8px; font-weight:600;">
                        Email
                    </label>
                    <input
                        type="email"
                        name="email"
                        placeholder="contoh@gmail.com"
                        required
                    >
                </div>

                <div class="form-group" style="margin-bottom:1.5rem;">
                    <label style="display:block; margin-bottom:8px; font-weight:600;">
                        Password
                    </label>
                    <input
                        type="password"
                        name="password"
                        placeholder="Buat password"
                        required
                    >
                </div>

                <div class="form-group" style="margin-bottom:2rem;">
                    <label style="display:block; margin-bottom:8px; font-weight:600;">
                        Konfirmasi Password
                    </label>
                    <input
                        type="password"
                        name="confirm_password"
                        placeholder="Ulangi password"
                        required
                    >
                </div>

                <button
                    type="submit"
                    class="btn-primary"
                    style="width:100%;"
                >
                    Buat Akun
                </button>

            </form>

            <div style="margin-top:2rem; text-align:center;">
                Sudah punya akun?
                <a
                    href="{% url 'login' %}"
                    style="
                        color:#6366f1;
                        text-decoration:none;
                        font-weight:600;
                    "
                >
                    Masuk
                </a>
            </div>

        </div>
    </div>

</body>
</html>
