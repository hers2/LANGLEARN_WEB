{% load static %}

<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangLearn - Register</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body class="auth-page">

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2><i class="fas fa-graduation-cap"></i> LangLearn</h2>
            <p>Buat akun baru 🚀</p>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert error">
                        <i class="fas fa-exclamation-circle"></i> {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="form-group">
                    <label><i class="fas fa-user"></i> Nama Lengkap</label>
                    <input
                        type="text"
                        name="fullname"
                        placeholder="Masukkan nama lengkap"
                        required
                    >
                </div>

                <div class="form-group">
                    <label><i class="fas fa-at"></i> Username</label>
                    <input
                        type="text"
                        name="username"
                        placeholder="Buat username unik"
                        required
                    >
                </div>

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input
                        type="email"
                        name="email"
                        placeholder="contoh@gmail.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input
                        type="password"
                        name="password"
                        placeholder="Buat password"
                        required
                        autocomplete="new-password"
                    >
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Konfirmasi Password</label>
                    <input
                        type="password"
                        name="confirm_password"
                        placeholder="Konfirmasi password"
                        required
                        autocomplete="new-password"
                    >
                </div>

                <button type="submit" class="btn-primary" style="width:100%;">
                    <i class="fas fa-user-plus"></i> Daftar
                </button>
            </form>

            <div class="auth-footer">
                Sudah punya akun? <a href="{% url 'login' %}"><i class="fas fa-sign-in-alt"></i> Masuk</a>
            </div>
        </div>
    </div>

</body>

</html>
